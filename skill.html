<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0%;
        text-decoration: none;
    }

    .skill-container {
        background-color: black;
        color: white;
    }

    .skill-logo {
        height: 80px;
        width: 60px;
        border-radius: 100%;
        
        
    }

    .skills {
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .skill-logo img {
        height: 100%;
        width: 100%;
    }

    .skill {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        list-style: none;
        padding: 10px;
    }
</style>

<body>
    <div class="skill-container">

        <div class="skills">
            <li class="skill">

                <div class="skill-logo"><img src="/skillImg/c.png" alt=""></div>
                <div class="skill-name">C Language</div>
            </li>

              <li class="skill">

                <div class="skill-logo"><img src="/skillImg/py.png" alt=""></div>
                <div class="skill-name">Python</div>
            </li>

                <li class="skill">

                <div class="skill-logo"><img src="/skillImg/linuxs.png" alt=""></div>
                <div class="skill-name">Linux</div>
            </li>
     

        </div>

    </div>

</body>

</html>
